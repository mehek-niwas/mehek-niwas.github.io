<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pomodoro | mehek niwas</title>

  <link rel="canonical" href="https://mehek-niwas.github.io/pomodoro" />
  <meta name="google-site-verification" content="sfQppSHf2YRlye86crIw0Kkf3EwVQxGGUvQ1bZif5K8" />

  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/webp" href="assets/wink_star.webp">

  <style>
    .pomodoro-main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 12px 24px 64px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .pomodoro-center-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin: 40px 0;
    }

    .pomodoro-timer-section {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0px;
      flex-wrap: wrap;
    }

    .tomato-guy-wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .pomodoro-mode-badge {
      font-family: 'VT323', monospace;
      font-size: 22px;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.7;
      line-height: 1;
      margin-bottom: 4px;
    }

    .pomodoro-mode-badge.mode-work { color: #000; }
    .pomodoro-mode-badge.mode-short { color: hotpink; }
    .pomodoro-mode-badge.mode-long { color: #4caf50; }

    .pomodoro-timer-column {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
    }

    .pomodoro-status-message {
      font-family: 'VT323', monospace;
      font-size: 24px;
      text-align: center;
      min-height: 32px;
      color: #000;
      opacity: 0.85;
      max-width: 500px;
      line-height: 1.3;
    }

    .pomodoro-status-message.is-highlight {
      color: rgb(233, 10, 99);
      font-size: 26px;
      opacity: 1;
    }

    .tomato-guy {
      width: 320px;
      height: 320px;
      object-fit: contain;
    }

    .tomato-guy.floating {
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .pomodoro-time-display {
      font-family: 'VT323', monospace;
      font-size: 120px;
      line-height: 1;
      letter-spacing: 4px;
      color: #000;
      text-align: center;
    }

    .pomodoro-controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .pomodoro-tomato-progress {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .tomato-icon {
      width: 48px;
      height: 48px;
      opacity: 0.3;
      transition: opacity 0.3s ease;
    }

    .tomato-icon.completed {
      opacity: 1;
    }

    .pomodoro-btn {
      background: #ffc0da;
      border: none;
      padding: 8px 20px;
      font-family: 'VT323', monospace;
      font-size: 20px;
      cursor: pointer;
      color: #000;
      min-width: 80px;
      transition: all 0.15s ease;
    }

    .pomodoro-btn:hover {
      background: hotpink;
    }

    .pomodoro-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .pomodoro-btn-primary {
      background: hotpink;
    }

    .pomodoro-btn-primary:hover {
      background: #ff69b4;
      filter: brightness(1.05);
    }

    .tasks-section {
      width: 100%;
      max-width: 700px;
      margin: 48px 0 0;
      padding: 24px;
      background: rgba(255, 192, 218, 0.3);
      border: 2px solid hotpink;
      border-radius: 12px;
    }

    .tasks-section h2 {
      font-family: 'VT323', monospace;
      font-size: 36px;
      margin: 0 0 20px;
      text-align: center;
    }

    .task-input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .task-input {
      flex: 1;
      padding: 10px 14px;
      font-family: 'Roboto', sans-serif;
      font-size: 16px;
      border: 2px solid #ffc0da;
      background: #fff;
      outline: none;
    }

    .task-input:focus {
      border-color: hotpink;
    }

    .task-add-btn {
      background: hotpink;
      border: none;
      padding: 10px 20px;
      font-family: 'VT323', monospace;
      font-size: 20px;
      cursor: pointer;
      color: #000;
    }

    .task-add-btn:hover {
      filter: brightness(1.1);
    }

    .task-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      margin-bottom: 8px;
      background: #fff;
      border: 2px solid #ffc0da;
      border-radius: 6px;
    }

    .task-item.completed {
      opacity: 0.6;
    }

    .task-checkbox {
      width: 28px;
      height: 28px;
      cursor: pointer;
      accent-color: hotpink;
    }

    .task-details {
      flex: 1;
      font-family: 'Roboto', sans-serif;
      font-size: 16px;
      text-align: left;
    }

    .task-details.completed {
      text-decoration: line-through;
    }

    .task-meta {
      font-family: 'VT323', monospace;
      font-size: 14px;
      color: #666;
      margin-top: 4px;
    }

    .task-delete {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #ff6b6b;
      padding: 4px 8px;
      line-height: 1;
    }

    .task-delete:hover {
      color: #ff0000;
    }

    .celebration {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
    }

    .celebration-tomato {
      position: absolute;
      width: 80px;
      height: 80px;
      animation: fall 2s ease-in forwards;
    }

    @keyframes fall {
      0% {
        transform: translateY(-100px) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
      }
    }

    .celebration-confetti {
      position: absolute;
      width: 12px;
      height: 12px;
      animation: confetti-fall 2.5s ease-in forwards;
    }

    @keyframes confetti-fall {
      0% {
        transform: translateY(-20px) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
      }
    }

    body.intro-active header,
    body.intro-active .pomodoro-main {
      filter: blur(6px);
      pointer-events: none;
      user-select: none;
    }

    .intro-overlay {
      position: fixed;
      inset: 0;
      z-index: 10001;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    .intro-overlay.is-visible {
      opacity: 1;
      visibility: visible;
    }

    .intro-overlay.is-dismissed {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .intro-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #ffc0da, hotpink, #fff5f8, #ffc0da);
      background-size: 300% 300%;
      animation: intro-gradient 4s ease infinite;
    }

    @keyframes intro-gradient {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .intro-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 24px;
      max-width: 100%;
    }

    .intro-tomato {
      width: clamp(120px, 28vw, 220px);
      height: clamp(120px, 28vw, 220px);
      object-fit: contain;
      margin-bottom: 8px;
      animation: bounce 1.2s ease-in-out infinite, intro-tomato-spin 6s linear infinite;
    }

    @keyframes intro-tomato-spin {
      0%, 100% { transform: rotate(-3deg); }
      50% { transform: rotate(3deg); }
    }

    .intro-line {
      font-family: 'VT323', monospace;
      line-height: 0.85;
      margin: 0;
      color: #000;
      text-shadow:
        3px 3px 0 hotpink,
        -1px -1px 0 #fff;
      opacity: 0;
    }

    .intro-line-1 {
      font-size: clamp(3rem, 12vw, 7rem);
      animation: intro-slide-left 0.6s ease forwards;
      animation-delay: 0.15s;
    }

    .intro-line-2 {
      font-size: clamp(4.5rem, 18vw, 11rem);
      color: hotpink;
      animation: intro-scale-bounce 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      animation-delay: 0.45s;
    }

    .intro-line-3 {
      font-size: clamp(3.5rem, 14vw, 9rem);
      animation: intro-wiggle-in 0.8s ease forwards, intro-wiggle 0.5s ease-in-out infinite alternate;
      animation-delay: 0.75s, 1.55s;
    }

    @keyframes intro-slide-left {
      from { opacity: 0; transform: translateX(-80px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes intro-scale-bounce {
      from { opacity: 0; transform: scale(0); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes intro-wiggle-in {
      from { opacity: 0; transform: rotate(-12deg) scale(0.8); }
      to { opacity: 1; transform: rotate(0) scale(1); }
    }

    @keyframes intro-wiggle {
      from { transform: rotate(-2deg) scale(1); }
      to { transform: rotate(2deg) scale(1.02); }
    }

    .intro-sub {
      font-family: 'VT323', monospace;
      font-size: 22px;
      margin: 12px 0 16px;
      opacity: 0;
      animation: intro-fade-up 0.5s ease forwards;
      animation-delay: 1.1s;
      color: #000;
    }

    @keyframes intro-fade-up {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 0.85; transform: translateY(0); }
    }

    .intro-fade-in {
      opacity: 0;
      animation: intro-fade-up 0.5s ease forwards;
      animation-delay: 1.3s;
    }

    .tasks-section.is-nudge {
      animation: tasks-nudge 1.5s ease;
    }

    @keyframes tasks-nudge {
      0%, 100% { border-color: hotpink; box-shadow: none; }
      25%, 75% { border-color: #ff69b4; box-shadow: 0 0 16px rgba(255, 105, 180, 0.5); }
    }

    @media (prefers-reduced-motion: reduce) {
      .intro-overlay { display: none !important; }
      body.intro-active header,
      body.intro-active .pomodoro-main {
        filter: none;
        pointer-events: auto;
        user-select: auto;
      }
      .intro-bg,
      .intro-line,
      .intro-sub,
      .intro-fade-in,
      .intro-tomato {
        animation: none !important;
        opacity: 1 !important;
        transform: none !important;
      }
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 10000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.is-visible {
      display: flex;
    }

    .receipt-modal {
      background: #fff;
      border: 4px solid hotpink;
      border-radius: 12px;
      padding: 32px;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .receipt-header {
      text-align: center;
      margin-bottom: 24px;
      border-bottom: 3px dashed hotpink;
      padding-bottom: 16px;
    }

    .receipt-header h2 {
      font-family: 'VT323', monospace;
      font-size: 42px;
      margin: 0 0 8px;
    }

    .receipt-date {
      font-family: 'VT323', monospace;
      font-size: 18px;
      opacity: 0.7;
    }

    .receipt-section {
      margin: 20px 0;
      font-family: 'VT323', monospace;
      font-size: 20px;
    }

    .receipt-section h3 {
      font-size: 28px;
      margin: 0 0 12px;
      color: hotpink;
    }

    .receipt-stat {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px dotted #ccc;
    }

    .receipt-task {
      padding: 8px 0;
      border-bottom: 1px dotted #ccc;
    }

    .receipt-task-name {
      font-weight: bold;
      margin-bottom: 4px;
    }

    .receipt-task-meta {
      font-size: 16px;
      opacity: 0.7;
      margin-left: 12px;
    }

    .receipt-footer {
      text-align: center;
      margin-top: 24px;
      padding-top: 16px;
      border-top: 3px dashed hotpink;
      font-family: 'VT323', monospace;
      font-size: 22px;
    }

    .receipt-close {
      margin-top: 20px;
      background: hotpink;
      border: none;
      padding: 12px 32px;
      font-family: 'VT323', monospace;
      font-size: 24px;
      cursor: pointer;
      color: #000;
    }

    .receipt-close:hover {
      filter: brightness(1.1);
    }

    .pomodoro-home {
      display: inline-block;
      margin-top: 32px;
      font-family: 'VT323', monospace;
      font-size: 18px;
      color: #000;
      opacity: 0.6;
      text-decoration: none;
      text-align: center;
      display: block;
    }

    .pomodoro-home:hover {
      opacity: 1;
      text-decoration: underline;
    }

    .secret-tomato-trigger {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 50px;
      height: 50px;
      background: none;
      border: none;
      cursor: pointer;
      opacity: 0.3;
      transition: opacity 0.3s ease, transform 0.3s ease;
      padding: 0;
    }

    .secret-tomato-trigger:hover {
      opacity: 1;
      transform: rotate(15deg) scale(1.1);
    }

    .secret-tomato-trigger img {
      width: 100%;
      height: 100%;
    }

    .settings-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 10000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .settings-modal.is-visible {
      display: flex;
    }

    .settings-panel {
      background: #fff;
      border: 4px solid hotpink;
      border-radius: 12px;
      padding: 32px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .settings-header {
      text-align: center;
      margin-bottom: 24px;
      border-bottom: 3px dashed hotpink;
      padding-bottom: 16px;
    }

    .settings-header h2 {
      font-family: 'VT323', monospace;
      font-size: 38px;
      margin: 0;
    }

    .settings-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .settings-field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .settings-field label {
      font-family: 'VT323', monospace;
      font-size: 22px;
      color: #000;
    }

    .settings-field input {
      padding: 10px 14px;
      font-family: 'Roboto', sans-serif;
      font-size: 18px;
      border: 2px solid #ffc0da;
      background: #fff;
      outline: none;
      border-radius: 4px;
    }

    .settings-field input:focus {
      border-color: hotpink;
    }

    .settings-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      justify-content: center;
    }

    .settings-btn {
      background: hotpink;
      border: none;
      padding: 12px 24px;
      font-family: 'VT323', monospace;
      font-size: 22px;
      cursor: pointer;
      color: #000;
      min-width: 100px;
    }

    .settings-btn:hover {
      filter: brightness(1.1);
    }

    .settings-btn-secondary {
      background: #ffc0da;
    }

    @media (max-width: 768px) {
      .pomodoro-time-display {
        font-size: 80px;
      }

      .tomato-guy {
        width: 200px;
        height: 200px;
      }

      .pomodoro-status-message {
        font-size: 20px;
        padding: 0 16px;
      }

      .tomato-icon {
        width: 36px;
        height: 36px;
      }

      .receipt-modal {
        padding: 20px;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="name-wrapper">
      <img src="assets/star.webp" class="star left" alt="" />
      <h1>pomodoro</h1>
      <img src="assets/wink_star.webp" class="winkstar right" alt="" />
    </div>
  </header>

  <main class="pomodoro-main">
    <div class="pomodoro-center-section">
      <div class="pomodoro-timer-section">
        <div class="tomato-guy-wrapper">
          <img src="assets/tomato-guy/tomato-guy.png" alt="Tomato Guy" class="tomato-guy" />
        </div>
        <div class="pomodoro-timer-column">
          <div class="pomodoro-mode-badge mode-work" id="modeBadge">🍅 focus</div>
          <div class="pomodoro-time-display" id="timeDisplay">25:00</div>
        </div>
      </div>

      <div class="pomodoro-controls">
        <button type="button" class="pomodoro-btn pomodoro-btn-primary" id="startBtn">start</button>
        <button type="button" class="pomodoro-btn" id="pauseBtn" style="display: none;">pause</button>
        <button type="button" class="pomodoro-btn" id="endBtn" style="display: none;">end</button>
      </div>

      <div class="pomodoro-status-message" id="statusMessage"></div>

      <div class="pomodoro-tomato-progress" id="tomatoProgress">
        <img src="assets/tomato-guy/tomato-guy.png" class="tomato-icon" alt="" />
        <img src="assets/tomato-guy/tomato-guy.png" class="tomato-icon" alt="" />
        <img src="assets/tomato-guy/tomato-guy.png" class="tomato-icon" alt="" />
        <img src="assets/tomato-guy/tomato-guy.png" class="tomato-icon" alt="" />
      </div>
    </div>

    <section class="tasks-section">
      <h2>tasks</h2>
      <div class="task-input-row">
        <input type="text" class="task-input" id="taskInput" placeholder="what are you working on?" />
        <button type="button" class="task-add-btn" id="addTaskBtn">add</button>
      </div>
      <ul class="task-list" id="taskList"></ul>
    </section>

    <a href="https://mehek-niwas.github.io" class="pomodoro-home">← back home</a>
  </main>

  <div class="intro-overlay" id="introOverlay" role="dialog" aria-modal="true" aria-labelledby="introTitle">
    <div class="intro-bg" aria-hidden="true"></div>
    <div class="intro-content">
      <img src="assets/tomato-guy/tomato-guy.png" alt="" class="intro-tomato" />
      <div id="introTitle">
        <p class="intro-line intro-line-1">it's</p>
        <p class="intro-line intro-line-2">tomato</p>
        <p class="intro-line intro-line-3">time!</p>
      </div>
      <p class="intro-sub"></p>
      <button type="button" class="pomodoro-btn pomodoro-btn-primary intro-fade-in" id="introStartBtn">press enter</button>
    </div>
  </div>

  <div class="celebration" id="celebration"></div>

  <div class="modal-overlay" id="receiptModal">
    <div class="receipt-modal">
      <div class="receipt-header">
        <h2>🍅 tomato summary 🍅</h2>
        <p class="receipt-date" id="receiptDate"></p>
      </div>
      <div id="receiptContent"></div>
      <div class="receipt-footer">
        <p>great work! 🌟</p>
        <button type="button" class="receipt-close" id="closeReceipt">close</button>
      </div>
    </div>
  </div>

  <button type="button" class="secret-tomato-trigger" id="settingsTrigger" title="secret settings">
    <img src="assets/tomato-guy/tomato-guy.png" alt="" />
  </button>

  <div class="settings-modal" id="settingsModal">
    <div class="settings-panel">
      <div class="settings-header">
        <h2>🍅 secret tomato settings 🍅</h2>
      </div>
      <form class="settings-form" id="settingsForm">
        <div class="settings-field">
          <label for="focusMinutes">focus time (minutes)</label>
          <input type="number" id="focusMinutes" min="1" max="120" value="25" />
        </div>
        <div class="settings-field">
          <label for="shortBreakMinutes">short break (minutes)</label>
          <input type="number" id="shortBreakMinutes" min="1" max="60" value="5" />
        </div>
        <div class="settings-field">
          <label for="longBreakMinutes">long break (minutes)</label>
          <input type="number" id="longBreakMinutes" min="1" max="60" value="15" />
        </div>
        <div class="settings-field">
          <label for="tomatoesForLongBreak">tomatoes until long break</label>
          <input type="number" id="tomatoesForLongBreak" min="2" max="10" value="4" />
        </div>
        <div class="settings-actions">
          <button type="submit" class="settings-btn">save</button>
          <button type="button" class="settings-btn settings-btn-secondary" id="cancelSettings">cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // Default timer settings (can be overridden by user settings)
    let MODES = {
      work: { seconds: 25 * 60, label: 'focus' },
      short: { seconds: 5 * 60, label: 'short break' },
      long: { seconds: 15 * 60, label: 'long break' },
    };
    
    let TOMATOES_FOR_LONG_BREAK = 4;

    // DOM elements --> make it so that javascript can read your html elements
    const timeDisplay = document.getElementById('timeDisplay');
    const tomatoGuy = document.querySelector('.tomato-guy');
    const modeBadge = document.getElementById('modeBadge');
    const statusMessage = document.getElementById('statusMessage');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const endBtn = document.getElementById('endBtn');
    const taskInput = document.getElementById('taskInput');
    const addTaskBtn = document.getElementById('addTaskBtn');
    const taskList = document.getElementById('taskList');
    const celebration = document.getElementById('celebration');
    const introOverlay = document.getElementById('introOverlay');
    const introStartBtn = document.getElementById('introStartBtn');
    const tasksSection = document.querySelector('.tasks-section');
    const tomatoProgress = document.getElementById('tomatoProgress');
    const receiptModal = document.getElementById('receiptModal');
    const closeReceipt = document.getElementById('closeReceipt');
    const settingsTrigger = document.getElementById('settingsTrigger');
    const settingsModal = document.getElementById('settingsModal');
    const settingsForm = document.getElementById('settingsForm');
    const cancelSettings = document.getElementById('cancelSettings');
    const focusMinutesInput = document.getElementById('focusMinutes');
    const shortBreakMinutesInput = document.getElementById('shortBreakMinutes');
    const longBreakMinutesInput = document.getElementById('longBreakMinutes');
    const tomatoesForLongBreakInput = document.getElementById('tomatoesForLongBreak');

    // State
    let currentMode = 'work';
    let totalSeconds = MODES.work.seconds;
    let remainingSeconds = totalSeconds;
    let timerId = null;
    let isRunning = false;
    let hasStarted = false;
    let completedPomodoros = 0;
    let documentTitle = document.title;

    // Session tracking
    let sessionStartTime = null;
    let totalFocusTime = 0;
    let currentFocusStartTime = null;
    let pauseCount = 0;
    let pauseLog = [];
    let tasks = [];
    let taskIdCounter = 0;
    let statusMessageTimeout = null;
    let introRainInterval = null;
    let introActive = false;
    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    const MODE_BADGE_LABELS = {
      work: '🍅 focus',
      short: '☕ short break',
      long: '🌴 long break',
    };

    function tomatoesLeftUntilLongBreak() {
      const inCycle = completedPomodoros % TOMATOES_FOR_LONG_BREAK;
      if (inCycle === 0 && completedPomodoros > 0) return 0;
      return TOMATOES_FOR_LONG_BREAK - inCycle;
    }

    function showStatusMessage(text, { highlight = false, autoRevert = true, duration = 5000 } = {}) {
      statusMessage.textContent = text;
      statusMessage.classList.toggle('is-highlight', highlight);
      clearTimeout(statusMessageTimeout);
      if (autoRevert && duration > 0) {
        statusMessageTimeout = setTimeout(updateStatusHint, duration);
      }
    }

    function updateStatusHint() {
      statusMessage.classList.remove('is-highlight');
      const left = tomatoesLeftUntilLongBreak();

      if (currentMode === 'work') {
        if (!hasStarted) {
          statusMessage.textContent = 'its tomato time! click start';
          statusMessage.classList.add('is-highlight');
        } else if (isRunning) {
          if (left === 0) {
            statusMessage.textContent = 'next tomato = long break!';
          } else {
            statusMessage.textContent = `${left} tomato${left === 1 ? '' : 'es'} until long break`;
          }
        } else if (left === 0) {
          statusMessage.textContent = 'next tomato = long break!';
        } else {
          statusMessage.textContent = `${left} tomato${left === 1 ? '' : 'es'} until long break`;
        }
      } else if (currentMode === 'short') {
        statusMessage.textContent = isRunning
          ? 'short break in progress ☕'
          : 'enjoy your short break ☕ click start when ready';
      } else {
        statusMessage.textContent = isRunning
          ? 'long break in progress 🌴'
          : 'enjoy your long break 🌴 click start when ready';
      }
    }

    function updateModeBadge() {
      modeBadge.textContent = MODE_BADGE_LABELS[currentMode];
      modeBadge.className = `pomodoro-mode-badge mode-${currentMode === 'work' ? 'work' : currentMode === 'short' ? 'short' : 'long'}`;
    }

    function updateModeUI() {
      updateModeBadge();
      updateStatusHint();
    }

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    function formatDuration(seconds) {
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = seconds % 60;
      if (h > 0) return `${h}h ${m}m ${s}s`;
      if (m > 0) return `${m}m ${s}s`;
      return `${s}s`;
    }

    function updateTomatoGuy() {
      tomatoGuy.classList.toggle('floating', isRunning && currentMode === 'work');
    }

    function updateDisplay() {
      timeDisplay.textContent = formatTime(remainingSeconds);
      document.title = isRunning
        ? `${formatTime(remainingSeconds)} · ${MODES[currentMode].label}`
        : documentTitle;
      updateTomatoProgress();
      updateTomatoGuy();
    }

    function updateTomatoProgress() {
      const tomatoIcons = tomatoProgress.querySelectorAll('.tomato-icon');
      
      // Update the number of tomato icons based on settings
      const currentCount = tomatoIcons.length;
      if (currentCount !== TOMATOES_FOR_LONG_BREAK) {
        tomatoProgress.innerHTML = '';
        for (let i = 0; i < TOMATOES_FOR_LONG_BREAK; i++) {
          const img = document.createElement('img');
          img.src = 'assets/tomato-guy/tomato-guy.png';
          img.className = 'tomato-icon';
          img.alt = '';
          tomatoProgress.appendChild(img);
        }
      }
      
      const icons = tomatoProgress.querySelectorAll('.tomato-icon');
      icons.forEach((icon, index) => {
        icon.classList.toggle('completed', index < (completedPomodoros % TOMATOES_FOR_LONG_BREAK));
      });
    }

    function setMode(mode) {
      if (isRunning) return;
      currentMode = mode;
      totalSeconds = MODES[mode].seconds;
      remainingSeconds = totalSeconds;
      updateDisplay();
      updateModeUI();
    }

    function updateButtonVisibility() {
      if (isRunning) {
        startBtn.style.display = 'none';
        pauseBtn.style.display = 'inline-block';
        endBtn.style.display = 'inline-block';
      } else if (hasStarted) {
        // paused. need to only show cotinue + end
        startBtn.style.display = 'inline-block';
        startBtn.textContent = 'continue';
        pauseBtn.style.display = 'none';
        endBtn.style.display = 'inline-block';
      }
      else {
        // not started yet
        startBtn.style.display = 'inline-block';
        startBtn.textContent = 'start';
        pauseBtn.style.display = hasStarted ? 'inline-block' : 'none';
        endBtn.style.display = hasStarted ? 'inline-block' : 'none';
      }
    }

    function playChime() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0.15, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.6);
      } catch (_) {}
    }

    function playFanfare() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const notes = [523, 659, 784];
        notes.forEach((freq, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.value = freq;
          const t = ctx.currentTime + i * 0.12;
          gain.gain.setValueAtTime(0.12, t);
          gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
          osc.start(t);
          osc.stop(t + 0.35);
        });
      } catch (_) {}
    }

    function spawnConfetti(count) {
      const colors = ['hotpink', '#ffc0da', '#4caf50', '#fff', '#ff6b6b'];
      for (let i = 0; i < count; i++) {
        setTimeout(() => {
          const piece = document.createElement('div');
          piece.className = 'celebration-confetti';
          piece.style.left = `${Math.random() * 100}%`;
          piece.style.background = colors[Math.floor(Math.random() * colors.length)];
          piece.style.animationDelay = `${Math.random() * 0.4}s`;
          piece.style.animationDuration = `${1.8 + Math.random()}s`;
          celebration.appendChild(piece);
          setTimeout(() => piece.remove(), 3000);
        }, i * 40);
      }
    }

    function spawnFallingTomatoes(count, { staggerMs = 80, size = 80 } = {}) {
      for (let i = 0; i < count; i++) {
        setTimeout(() => {
          const tomato = document.createElement('img');
          tomato.src = 'assets/tomato-guy/tomato-guy.png';
          tomato.className = 'celebration-tomato';
          tomato.style.left = `${Math.random() * 100}%`;
          tomato.style.width = `${size}px`;
          tomato.style.height = `${size}px`;
          tomato.style.animationDelay = `${Math.random() * 0.3}s`;
          celebration.appendChild(tomato);
          setTimeout(() => tomato.remove(), 2500);
        }, i * staggerMs);
      }
    }

    function celebrateTomato() {
      playChime();
      spawnFallingTomatoes(20);
      spawnConfetti(30);

      if (document.hidden && 'Notification' in window && Notification.permission === 'granted') {
        new Notification('Pomodoro', { body: 'Tomato complete! 🍅' });
      }
    }

    function startIntroParty() {
      if (prefersReducedMotion) return;

      introActive = true;
      document.body.classList.add('intro-active');
      introOverlay.classList.add('is-visible');
      playFanfare();
      spawnFallingTomatoes(40, { staggerMs: 60, size: 70 });
      spawnConfetti(50);

      introRainInterval = window.setInterval(() => {
        if (!introActive) return;
        spawnFallingTomatoes(8, { staggerMs: 100, size: 60 });
        spawnConfetti(12);
      }, 2200);

      document.addEventListener('keydown', onIntroKeydown);
    }

    function onIntroKeydown(e) {
      if (!introActive || e.key !== 'Enter') return;
      e.preventDefault();
      handleIntroDismiss();
    }

    function dismissIntro() {
      if (!introActive) return;
      introActive = false;
      window.clearInterval(introRainInterval);
      introRainInterval = null;
      document.removeEventListener('keydown', onIntroKeydown);

      introOverlay.classList.add('is-dismissed');
      introOverlay.classList.remove('is-visible');
      document.body.classList.remove('intro-active');

      spawnFallingTomatoes(15, { staggerMs: 50, size: 65 });
      spawnConfetti(25);

      window.setTimeout(() => {
        introOverlay.remove();
      }, 550);
    }

    function handleIntroDismiss() {
      if (!introActive) return;
      dismissIntro();

      window.setTimeout(() => {
        showStatusMessage('click start when ready!', {
          highlight: true,
          autoRevert: false,
        });
        taskInput.focus();
        tasksSection.classList.add('is-nudge');
        window.setTimeout(() => tasksSection.classList.remove('is-nudge'), 1500);
        if (window.innerWidth < 768) {
          taskInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }, 600);
    }

    function tick() {
      if (remainingSeconds <= 0) {
        if (currentMode === 'work') {
          completedPomodoros += 1;
          celebrateTomato();

          const nextMode = completedPomodoros % TOMATOES_FOR_LONG_BREAK === 0 ? 'long' : 'short';
          pauseTimer();
          setMode(nextMode);

          if (nextMode === 'long') {
            showStatusMessage('tomato complete! you earned a long break!', { highlight: true, autoRevert: false });
          } else {
            const left = tomatoesLeftUntilLongBreak();
            showStatusMessage(
              `tomato complete! short break starting... ${left} tomato${left === 1 ? '' : 'es'} until long break`,
              { highlight: true, autoRevert: false }
            );
          }
        } else if (currentMode === 'short') {
          pauseTimer();
          setMode('work');
          showStatusMessage('short break over! back to tomato time', { highlight: true });
        } else {
          pauseTimer();
          setMode('work');
          showStatusMessage('long break over! back to tomato time', { highlight: true });
        }
        return;
      }
      
      remainingSeconds -= 1;
      updateDisplay();
    }

    function startTimer() {
      if (isRunning) return;
      
      if (!hasStarted) {
        hasStarted = true;
        sessionStartTime = Date.now();
      }

      if (currentMode === 'work' && !currentFocusStartTime) {
        currentFocusStartTime = Date.now();
      }

      isRunning = true;
      timerId = window.setInterval(tick, 1000);
      updateDisplay();
      updateButtonVisibility();
      clearTimeout(statusMessageTimeout);
      updateStatusHint();
    }

    function pauseTimer() {
      if (!isRunning) return;
      
      isRunning = false;
      window.clearInterval(timerId);
      timerId = null;
      document.title = documentTitle;

      if (currentMode === 'work' && currentFocusStartTime) {
        const focusDuration = Math.floor((Date.now() - currentFocusStartTime) / 1000);
        totalFocusTime += focusDuration;
        currentFocusStartTime = null;
        
        pauseCount += 1;
        pauseLog.push({
          time: new Date().toLocaleTimeString(),
          duration: focusDuration
        });
      }

      updateButtonVisibility();
      updateTomatoGuy();
      updateStatusHint();
    }

    function resetSession() {
      hasStarted = false;
      isRunning = false;
      if (timerId) {
        window.clearInterval(timerId);
        timerId = null;
      }

      sessionStartTime = null;
      totalFocusTime = 0;
      currentFocusStartTime = null;
      pauseCount = 0;
      pauseLog = [];
      completedPomodoros = 0;
      tasks = [];
      taskIdCounter = 0;

      setMode('work');
      renderTasks();
      updateTomatoProgress();
      document.title = documentTitle;
      updateButtonVisibility();
      clearTimeout(statusMessageTimeout);
      updateModeUI();
    }

    function endSession() {
      if (isRunning) pauseTimer();
      generateReceipt();
      resetSession();
      receiptModal.classList.add('is-visible');
    }

    function generateReceipt() {
      const receiptDate = document.getElementById('receiptDate');
      const receiptContent = document.getElementById('receiptContent');
      
      const now = new Date();
      receiptDate.textContent = now.toLocaleString();
      
      const totalElapsed = sessionStartTime ? Math.floor((Date.now() - sessionStartTime) / 1000) : 0;
      
      let html = '<div class="receipt-section"><h3>session stats</h3>';
      html += `<div class="receipt-stat"><span>completed tomatoes:</span><span>${completedPomodoros} 🍅</span></div>`;
      html += `<div class="receipt-stat"><span>total focus time:</span><span>${formatDuration(totalFocusTime)}</span></div>`;
      html += `<div class="receipt-stat"><span>total elapsed time:</span><span>${formatDuration(totalElapsed)}</span></div>`;
      html += `<div class="receipt-stat"><span>pause count:</span><span>${pauseCount}</span></div>`;
      html += '</div>';

      if (pauseLog.length > 0) {
        html += '<div class="receipt-section"><h3>pause log</h3>';
        pauseLog.forEach((pause, i) => {
          html += `<div class="receipt-stat"><span>pause ${i + 1} at ${pause.time}:</span><span>${formatDuration(pause.duration)}</span></div>`;
        });
        html += '</div>';
      }

      if (tasks.length > 0) {
        html += '<div class="receipt-section"><h3>✓ tasks</h3>';
        tasks.forEach(task => {
          const status = task.completed ? '✓' : '○';
          html += `<div class="receipt-task">`;
          html += `<div class="receipt-task-name">${status} ${task.name}</div>`;
          html += `<div class="receipt-task-meta">added: ${new Date(task.addedAt).toLocaleTimeString()}`;
          if (task.completed) {
            const focusTime = Math.floor((task.completedAt - task.addedAt) / 1000);
            html += ` | completed: ${new Date(task.completedAt).toLocaleTimeString()} | focus time: ${formatDuration(focusTime)}`;
          }
          html += '</div></div>';
        });
        html += '</div>';
      }
      
      receiptContent.innerHTML = html;
    }

    // Task management
    function addTask() {
      const name = taskInput.value.trim();
      if (!name) return;
      
      const task = {
        id: taskIdCounter++,
        name,
        addedAt: Date.now(),
        completed: false,
        completedAt: null
      };
      
      tasks.push(task);
      renderTasks();
      taskInput.value = '';
    }

    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      renderTasks();
    }

    function toggleTask(id) {
      const task = tasks.find(t => t.id === id);
      if (task) {
        task.completed = !task.completed;
        task.completedAt = task.completed ? Date.now() : null;
        renderTasks();
      }
    }

    function renderTasks() {
      taskList.innerHTML = '';
      tasks.forEach(task => {
        const li = document.createElement('li');
        li.className = `task-item ${task.completed ? 'completed' : ''}`;
        
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.className = 'task-checkbox';
        checkbox.checked = task.completed;
        checkbox.addEventListener('change', () => toggleTask(task.id));
        
        const details = document.createElement('div');
        details.className = `task-details ${task.completed ? 'completed' : ''}`;
        details.innerHTML = `
          <div>${task.name}</div>
          <div class="task-meta">added at ${new Date(task.addedAt).toLocaleTimeString()}${task.completed ? ` • completed at ${new Date(task.completedAt).toLocaleTimeString()}` : ''}</div>
        `;
        
        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'task-delete';
        deleteBtn.textContent = '×';
        deleteBtn.addEventListener('click', () => deleteTask(task.id));
        
        li.appendChild(checkbox);
        li.appendChild(details);
        li.appendChild(deleteBtn);
        taskList.appendChild(li);
      });
    }

    // Settings management
    function loadSettings() {
      try {
        const saved = localStorage.getItem('tomatoSettings');
        if (saved) {
          const settings = JSON.parse(saved);
          MODES.work.seconds = settings.focusMinutes * 60;
          MODES.short.seconds = settings.shortBreakMinutes * 60;
          MODES.long.seconds = settings.longBreakMinutes * 60;
          TOMATOES_FOR_LONG_BREAK = settings.tomatoesForLongBreak;
          
          focusMinutesInput.value = settings.focusMinutes;
          shortBreakMinutesInput.value = settings.shortBreakMinutes;
          longBreakMinutesInput.value = settings.longBreakMinutes;
          tomatoesForLongBreakInput.value = settings.tomatoesForLongBreak;
        }
      } catch (e) {
        console.error('Failed to load settings', e);
      }
    }

    function saveSettings() {
      const settings = {
        focusMinutes: parseInt(focusMinutesInput.value),
        shortBreakMinutes: parseInt(shortBreakMinutesInput.value),
        longBreakMinutes: parseInt(longBreakMinutesInput.value),
        tomatoesForLongBreak: parseInt(tomatoesForLongBreakInput.value)
      };
      
      MODES.work.seconds = settings.focusMinutes * 60;
      MODES.short.seconds = settings.shortBreakMinutes * 60;
      MODES.long.seconds = settings.longBreakMinutes * 60;
      TOMATOES_FOR_LONG_BREAK = settings.tomatoesForLongBreak;
      
      localStorage.setItem('tomatoSettings', JSON.stringify(settings));
      
      // Reset current timer if not running
      if (!isRunning && !hasStarted) {
        setMode('work');
        updateTomatoProgress();
      }
      
      settingsModal.classList.remove('is-visible');
    }

    // Event listeners
    introStartBtn.addEventListener('click', handleIntroDismiss);
    startBtn.addEventListener('click', startTimer);
    pauseBtn.addEventListener('click', pauseTimer);
    endBtn.addEventListener('click', endSession);
    
    addTaskBtn.addEventListener('click', addTask);
    taskInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') addTask();
    });

    closeReceipt.addEventListener('click', () => {
      receiptModal.classList.remove('is-visible');
    });

    settingsTrigger.addEventListener('click', () => {
      settingsModal.classList.add('is-visible');
    });

    cancelSettings.addEventListener('click', () => {
      settingsModal.classList.remove('is-visible');
      loadSettings(); // Reset form to saved values
    });

    settingsForm.addEventListener('submit', (e) => {
      e.preventDefault();
      saveSettings();
    });

    settingsModal.addEventListener('click', (e) => {
      if (e.target === settingsModal) {
        settingsModal.classList.remove('is-visible');
        loadSettings(); // Reset form to saved values
      }
    });

    if ('Notification' in window && Notification.permission === 'default') {
      const requestOnStart = () => {
        Notification.requestPermission();
        startBtn.removeEventListener('click', requestOnStart);
      };
      startBtn.addEventListener('click', requestOnStart);
    }

    // Initialize
    loadSettings();
    setMode('work');
    updateTomatoProgress();
    updateButtonVisibility();
    updateModeUI();
    startIntroParty();
  </script>
</body>
</html>
